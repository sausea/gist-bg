services:
  gist:
    image: ${GIST_IMAGE:-gist:offline-amd64}
    container_name: gist
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - GIST_LOG_LEVEL=info
      # Save exported Markdown directly into the mounted host directory (./data)
      - GIST_EXPORT_DIR=/app/data
      # - GIST_SWAGGER=true  # Enable Swagger API docs at /swagger/index.html
    restart: always
